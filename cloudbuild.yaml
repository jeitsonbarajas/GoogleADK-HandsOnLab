# Google Cloud Build configuration
steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/google-adk-agents:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/google-adk-agents:latest',
      '.'
    ]

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/google-adk-agents:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/google-adk-agents:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'google-adk-agents',
      '--image', 'gcr.io/$PROJECT_ID/google-adk-agents:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--max-instances', '10',
      '--memory', '2Gi',
      '--cpu', '2',
      '--port', '8000',
      '--timeout', '300',
      '--set-env-vars', 'ENVIRONMENT=gcp,PYTHONPATH=/app',
      '--service-account', 'google-adk-agents-sa@$PROJECT_ID.iam.gserviceaccount.com'
    ]

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/google-adk-agents:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/google-adk-agents:latest'

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Set timeout
timeout: '1200s'